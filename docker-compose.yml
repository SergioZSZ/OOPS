services:
  # Shared LLM runtime used by OOPsPlus checkers
  ollama:
    image: ollama/ollama:latest
    container_name: oops-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # Pulls the configured model into the shared Ollama volume
  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: oops-ollama-pull-model
    env_file:
      - .env
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull ${LLM_MODEL:-gemma3:4b}"

  # Shared queue for OOPS+ report jobs published by OOPs
  rabbitmq:
    image: rabbitmq:3-management
    container_name: oops-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-oops}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-oops}
    restart: unless-stopped

  # Normal OOPS web application. It serves the immediate report
  web-app-oops:
    build:
      context: ./OOPs
      dockerfile: Dockerfile
    container_name: oops
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq
    volumes:
      - ./data/oops_analyses:/data/oops/analyses
    restart: unless-stopped

  # OOPS+ web application. It shows queued LLM reports when they are ready
  web-app-oops-plus:
    build:
      context: ./OOPsPlus
      dockerfile: Dockerfile
    container_name: oops-plus
    env_file:
      - .env
    ports:
      - "8081:8080"
    depends_on:
      - ollama
      - rabbitmq
    volumes:
      - ./data/oops_analyses:/data/oops/analyses
    restart: unless-stopped

  # Background worker that consumes OOPS+ ontology jobs one by one
  oops-plus-worker:
    build:
      context: ./OOPsPlus
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - ollama
      - rabbitmq
    volumes:
      - ./data/oops_analyses:/data/oops/analyses
    restart: unless-stopped

volumes:
  ollama_data:
    name: oops_ollama_data
